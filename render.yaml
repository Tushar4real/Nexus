services:
  - type: web
    name: nexus-productivity
    env: docker
    plan: free
    dockerfilePath: ./deployment/Dockerfile
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
